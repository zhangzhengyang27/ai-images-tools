appId: com.ai-images-tools.app
productName: ai-images-tools
directories:
  buildResources: build
  output: dist
files:
  - '!**/.git'
  - '!**/.DS_Store'
  - '!**/node_modules/*'
  - '!**/{.gitignore,.eslintrc,.eslintignore}'
  - '!**/{tsconfig,tsconfig.node}.json'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.prettier,.prettierignore}'
  - '!*.md'
  - '!docs/*'
  - '!test.js'
  - '!vitest.config.*'
  - '!out/mac-arm64'
asar: true
asarUnpack:
  - '**/*.node'
  - '**/vendor/**'
mac:
  entitlementsInherit: 'build/entitlements.mac.plist'
  category: public.app-category.graphics-design
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: zhangzhengyang27
  repo: ai-images-tools
